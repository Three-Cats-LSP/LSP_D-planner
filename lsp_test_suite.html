<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSP D-Planner v2.0β2 — Algorithm Test Suite</title>
<style>
  :root {
    --bg: #0d0f14;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --cyan: #39d353;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; padding: 16px; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--blue); }
  .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
  .controls label { color: var(--muted); font-size: 11px; }
  select, input[type=number] { background: #21262d; border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 4px 8px; font-size: 12px; }
  button { background: var(--blue); color: #000; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  button:hover { background: #79c0ff; }
  button.run-all { background: var(--green); }
  button.run-all:hover { background: #56d364; }
  .test-grid { display: grid; gap: 12px; }
  .test-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .test-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #1c2128; border-bottom: 1px solid var(--border); cursor: pointer; }
  .test-title { font-weight: 600; font-size: 13px; }
  .test-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .badge-pass { background: #1a4a2a; color: var(--green); border: 1px solid #2ea043; }
  .badge-warn { background: #3d2800; color: var(--orange); border: 1px solid #d29922; }
  .badge-fail { background: #3d0c09; color: var(--red); border: 1px solid #f85149; }
  .badge-pending { background: #21262d; color: var(--muted); border: 1px solid var(--border); }
  .test-body { padding: 14px; }
  .params { font-family: monospace; font-size: 11px; color: var(--muted); margin-bottom: 10px; background: #21262d; padding: 6px 10px; border-radius: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { padding: 6px 8px; text-align: left; color: var(--muted); font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 5px 8px; border-bottom: 1px solid #1c2128; font-family: monospace; }
  tr:last-child td { border-bottom: none; }
  .match { color: var(--green); }
  .close { color: var(--cyan); }
  .diff { color: var(--orange); font-weight: 600; }
  .bigdiff { color: var(--red); font-weight: 600; }
  .engine-lsp { color: var(--blue); }
  .engine-apex { color: var(--purple); }
  .summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
  .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; text-align: center; }
  .stat-val { font-size: 24px; font-weight: 700; }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .log { font-family: monospace; font-size: 11px; color: var(--muted); background: #21262d; padding: 8px 10px; border-radius: 4px; max-height: 120px; overflow-y: auto; margin-top: 8px; white-space: pre-wrap; }
  .algo-section { margin-bottom: 10px; }
  .algo-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .stops-row td:first-child { color: var(--text); }
  .running { opacity: 0.6; }
  .col-depth { width: 70px; }
  .col-lsp { width: 80px; }
  .col-apex { width: 80px; }
  .col-delta { width: 70px; }
  .col-status { width: 60px; }
  .divider { height: 1px; background: var(--border); margin: 10px 0; }
  #progressBar { height: 4px; background: #21262d; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
  #progressFill { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s; border-radius: 2px; }
  .test-meta { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<h1>LSP D-Planner v2.0β2 — Algorithm Test Suite</h1>
<p class="subtitle">Comparative testing: LSP VPM-B vs ApexDeco VPM-B vs ApexDeco Bühlmann ZHL-16C+GF</p>

<div id="progressBar"><div id="progressFill"></div></div>

<div class="summary">
  <div class="stat-box"><div class="stat-val" id="totalTests">—</div><div class="stat-lbl">Total Tests</div></div>
  <div class="stat-box"><div class="stat-val" style="color:var(--green)" id="passCount">—</div><div class="stat-lbl">Pass (≤1min delta)</div></div>

  <div class="stat-box"><div class="stat-val" style="color:var(--red)" id="failCount">—</div><div class="stat-lbl">Fail (errors/large diff)</div></div>

<div class="controls">

    <label>GF Lo</label><br>
    <input type="number" id="gfLo" value="30" min="10" max="100" style="width:60px">
  </div>
  <div>

  </div>
  <div>
    <label>GFS Hi</label><br>
    <input type="number" id="gfsHi" value="85" min="10" max="100" style="width:60px">

  <div>

</div>

<div class="test-grid" id="testGrid"></div>

<!-- ENGINES -->
<script>
// ══════════════════════════════════════════════════════════
// ApexDeco ZHL-16C+GF Engine
// ══════════════════════════════════════════════════════════
const DecoEngine = (() => {
    // ZHL-16A (Bühlmann 1984) — first compartment N2 ht=5.0 min, a[0]=1.1696, b[0]=0.5578
    const ZHL16A_N2 = [
        { ht: 5.0,    a: 1.1696, b: 0.5578 },
        { ht: 8.0,    a: 1.0000, b: 0.6514 },
        { ht: 12.5,   a: 0.8618, b: 0.7222 },
        { ht: 18.5,   a: 0.7562, b: 0.7825 },
        { ht: 27.0,   a: 0.6200, b: 0.8126 },
        { ht: 38.3,   a: 0.5043, b: 0.8434 },
        { ht: 54.3,   a: 0.4410, b: 0.8693 },
        { ht: 77.0,   a: 0.4000, b: 0.8910 },
        { ht: 109.0,  a: 0.3750, b: 0.9092 },
        { ht: 146.0,  a: 0.3500, b: 0.9222 },
        { ht: 187.0,  a: 0.3295, b: 0.9319 },
        { ht: 239.0,  a: 0.3065, b: 0.9403 },
        { ht: 305.0,  a: 0.2835, b: 0.9477 },
        { ht: 390.0,  a: 0.2610, b: 0.9544 },
        { ht: 498.0,  a: 0.2480, b: 0.9602 },
        { ht: 635.0,  a: 0.2327, b: 0.9653 }
    ];
    // ZHL-16B (Bühlmann 1992) — first compartment N2 ht=5.0 min, a[0]=1.2599, b[0]=0.5050
    const ZHL16B_N2 = [
        { ht: 5.0,    a: 1.2599, b: 0.5050 },
        { ht: 8.0,    a: 1.0000, b: 0.6514 },
        { ht: 12.5,   a: 0.8618, b: 0.7222 },
        { ht: 18.5,   a: 0.7562, b: 0.7825 },
        { ht: 27.0,   a: 0.6200, b: 0.8126 },
        { ht: 38.3,   a: 0.5043, b: 0.8434 },
        { ht: 54.3,   a: 0.4410, b: 0.8693 },
        { ht: 77.0,   a: 0.4000, b: 0.8910 },
        { ht: 109.0,  a: 0.3750, b: 0.9092 },
        { ht: 146.0,  a: 0.3500, b: 0.9222 },
        { ht: 187.0,  a: 0.3295, b: 0.9319 },
        { ht: 239.0,  a: 0.3065, b: 0.9403 },
        { ht: 305.0,  a: 0.2835, b: 0.9477 },
        { ht: 390.0,  a: 0.2610, b: 0.9544 },
        { ht: 498.0,  a: 0.2480, b: 0.9602 },
        { ht: 635.0,  a: 0.2327, b: 0.9653 }
    ];
    // ZHL-16C — first compartment N2 ht=4.0 min (most conservative, used in dive computers)
    const ZHL16C_N2 = [
        { ht: 4.0,    a: 1.2599, b: 0.5050 },
        { ht: 8.0,    a: 1.0000, b: 0.6514 },
        { ht: 12.5,   a: 0.8618, b: 0.7222 },
        { ht: 18.5,   a: 0.7562, b: 0.7825 },
        { ht: 27.0,   a: 0.6200, b: 0.8126 },
        { ht: 38.3,   a: 0.5043, b: 0.8434 },
        { ht: 54.3,   a: 0.4410, b: 0.8693 },
        { ht: 77.0,   a: 0.4000, b: 0.8910 },
        { ht: 109.0,  a: 0.3750, b: 0.9092 },
        { ht: 146.0,  a: 0.3500, b: 0.9222 },
        { ht: 187.0,  a: 0.3295, b: 0.9319 },
        { ht: 239.0,  a: 0.3065, b: 0.9403 },
        { ht: 305.0,  a: 0.2835, b: 0.9477 },
        { ht: 390.0,  a: 0.2610, b: 0.9544 },
        { ht: 498.0,  a: 0.2480, b: 0.9602 },
        { ht: 635.0,  a: 0.2327, b: 0.9653 }
    ];
    // Active N2 table — selected per calculate() call based on settings.decoModel
    let _tblN2 = ZHL16C_N2;
    const ZHL16C_He = [
        { ht: 1.51,   a: 1.7424, b: 0.4245 },
        { ht: 3.02,   a: 1.3830, b: 0.5747 },
        { ht: 4.72,   a: 1.1919, b: 0.6527 },
        { ht: 6.99,   a: 1.0458, b: 0.7223 },
        { ht: 10.21,  a: 0.9220, b: 0.7582 },
        { ht: 14.48,  a: 0.8205, b: 0.7957 },
        { ht: 20.53,  a: 0.7305, b: 0.8279 },
        { ht: 29.11,  a: 0.6502, b: 0.8553 },
        { ht: 41.20,  a: 0.5950, b: 0.8757 },
        { ht: 55.19,  a: 0.5545, b: 0.8903 },
        { ht: 70.69,  a: 0.5333, b: 0.8997 },
        { ht: 90.34,  a: 0.5189, b: 0.9073 },
        { ht: 115.29, a: 0.5181, b: 0.9122 },
        { ht: 147.42, a: 0.5176, b: 0.9171 },
        { ht: 188.24, a: 0.5172, b: 0.9217 },
        { ht: 240.03, a: 0.5119, b: 0.9267 }
    ];
    const NUM_COMPARTMENTS = 16;
    const WATER_VAPOR_PRESSURE = 0.0577; 
    const SLP_SW_M = 10.078; 
    const SLP_FW_M = 10.337; 
    const SLP_SW_F = 33.066; 
    const SLP_FW_F = 33.914; 
    function createDefaultSettings() {
        return {
            circuit: 'OC',
            decoModel: 'ZHLC_GF',
            gfLo: 30,
            gfHi: 85,
            gfs: 85,
            conservatism: 0,
            oxyNarc: false,
            metric: true,
            waterType: 0, 
            altitude: 0,
            acclimatized: 0,
            gasVolUnit: 'ltr',
            pressureUnit: 'bar',
            temperature: 20,
            mix_units: 0, 
            mix_temp_units: 0, 
            mix_temp: 4, 
            mix_banked32: false,
            gaugeType: 1, 
            descentRate: 22,
            ascentRate: 9,
            decoAscentRate: 9,
            surfaceAscentRate: 9,
            stepSize: 3,
            lastStop: 3,
            lastStopCCR: 3,
            minStopTime: 1,
            ppO2Deco: 1.6,
            ppO2Low: 1.4,
            ppO2Mid: 1.5,
            ppO2High: 1.6,
            ppO2Bottom: 1.4,
            o2MaxDepth: 6,
            firstStop30sec: false,
            firstStopDoubleStep: false,
            ccrDefaultSP: 1.3,
            spUnits: 'bar',
            rmvBottom: 22,
            rmvDeco: 20,
            rmvDilCCR: 1,
            extendedStops: false,
            extStopDeep: 1,
            extStopShallow: 2,
            extendAdd: false,
            extendAllMix: false,
            extendO2Window: false,
            warnPpO2Hi: true,
            ppO2HighThreshold: 1.6,
            warnColorPpO2Hi: '#ff8080',
            warnPpO2Lo: true,
            ppO2LowThreshold: 0.16,
            warnColorPpO2Lo: '#ff8080',
            warnCNS: true,
            cnsHigh: 80,
            warnColorCNS: '#ffff00',
            warnOTU: true,
            otuHigh: 300,
            warnColorOTU: '#ffff00',
            warnIBCDN2: true,
            ibcdN2Threshold: 0.5,
            warnColorIBCDN2: '#ff0000',
            warnIBCDHe: true,
            ibcdHeThreshold: 0.5,
            warnColorIBCDHe: '#ff0000',
            ccrDilCheck: true,
            warnColorCCRDil: '#ff8040',
            bailoutActive: false,
            bailModel: 'ZHLC_GF',
            bailGFLo: 30,
            bailGFHi: 85,
            bailGFS: 85,
            bailRMV: 30,
            bailExtraMin: false,
            bailExtraMinTime: 1,
            bailDiveNum: 1,
            bailCaveBail: false,
            bailCavePortion: 33,
            surfaceInterval: 0,
            twoWeekOTU: 0,
            travelO2: 21,
            travelHe: 0,
        };
    }
    function getCCRFractions(o2Frac, heFrac, setpoint, pAmb) {
        const effO2 = Math.min(1.0, setpoint / pAmb);
        const n2Frac = 1.0 - o2Frac - heFrac;
        const inertSum = heFrac + n2Frac;
        let effN2, effHe;
        if (inertSum > 0 && o2Frac < 1.0) {
            effN2 = n2Frac * (1.0 - effO2) / (1.0 - o2Frac);
            effHe = (1.0 - effO2) - effN2;
        } else {
            effN2 = 0;
            effHe = 0;
        }
        return { o2: effO2, n2: effN2, he: Math.max(0, effHe) };
    }
    function getDepthPressure(depth, settings) {
        let slp;
        if (settings.metric) {
            slp = settings.waterType === 0 ? SLP_SW_M : SLP_FW_M;
        } else {
            slp = settings.waterType === 0 ? SLP_SW_F : SLP_FW_F;
        }
        return depth / slp;
    }
    function getSurfacePressure(settings) {
        const alt = settings.altitude || 0;
        return 1.01325 * Math.exp(-alt / 8434);
    }
    function getAmbientPressure(depth, settings) {
        return getSurfacePressure(settings) + getDepthPressure(depth, settings);
    }
    function gasN2Fraction(o2Frac, heFrac) {
        return 1.0 - o2Frac - heFrac;
    }
    function createTissueState(settings) {
        const pAmb = getSurfacePressure(settings);
        const ppH2O = WATER_VAPOR_PRESSURE;
        const inspiredN2 = 0.7902 * (pAmb - ppH2O);
        const inspiredHe = 0.0;
        const tissues = [];
        for (let i = 0; i < NUM_COMPARTMENTS; i++) {
            tissues.push({
                pN2: inspiredN2,
                pHe: inspiredHe
            });
        }
        if (settings._preTissues && settings._preTissues.length === NUM_COMPARTMENTS) {
            for (let i = 0; i < NUM_COMPARTMENTS; i++) {
                tissues[i].pN2 = settings._preTissues[i].pN2;
                tissues[i].pHe = settings._preTissues[i].pHe;
            }
            if (settings._surfaceInterval > 0) {
                applySurfaceInterval(tissues, settings._surfaceInterval, settings);
            }
        }
        return tissues;
    }
    function haldaneEquation(pStart, pInspired, halfTime, time) {
        const k = Math.LN2 / halfTime;
        return pStart + (pInspired - pStart) * (1 - Math.exp(-k * time));
    }
    function loadTissuesConstantDepth(tissues, depth, time, o2Frac, heFrac, settings, setpoint) {
        const pAmb = getAmbientPressure(depth, settings);
        const ppH2O = WATER_VAPOR_PRESSURE;
        let n2Frac, heFracEff;
        if (setpoint && setpoint > 0) {
            const ccr = getCCRFractions(o2Frac, heFrac, setpoint, pAmb);
            n2Frac = ccr.n2;
            heFracEff = ccr.he;
        } else {
            n2Frac = gasN2Fraction(o2Frac, heFrac);
            heFracEff = heFrac;
        }
        const inspN2 = n2Frac * (pAmb - ppH2O);
        const inspHe = heFracEff * (pAmb - ppH2O);
        for (let i = 0; i < NUM_COMPARTMENTS; i++) {
            tissues[i].pN2 = haldaneEquation(tissues[i].pN2, inspN2, _tblN2[i].ht, time);
            tissues[i].pHe = haldaneEquation(tissues[i].pHe, inspHe, ZHL16C_He[i].ht, time);
        }
    }
    function loadTissuesLinearDepthChange(tissues, startDepth, endDepth, rate, o2Frac, heFrac, settings, setpoint) {
        const time = Math.abs(endDepth - startDepth) / rate;
        if (time <= 0) return 0;
        const ppH2O = WATER_VAPOR_PRESSURE;
        const surfP = getSurfacePressure(settings);
        let slp;
        if (settings.metric) {
            slp = SLP_SW_M;
        } else {
            slp = SLP_SW_F;
        }
        if (setpoint && setpoint > 0) {
            const steps = Math.max(1, Math.ceil(time));
            const dt = time / steps;
            for (let s = 0; s < steps; s++) {
                const t0 = s / steps;
                const t1 = (s + 1) / steps;
                const d0 = startDepth + (endDepth - startDepth) * t0;
                const d1 = startDepth + (endDepth - startDepth) * t1;
                const midDepth = (d0 + d1) / 2;
                const pAmbMid = surfP + midDepth / slp;
                const ccr = getCCRFractions(o2Frac, heFrac, setpoint, pAmbMid);
                const n2Frac = ccr.n2;
                const heFracEff = ccr.he;
                const depthRate = (d1 - d0) / dt;
                const pressureRate = depthRate / slp;
                const pAmbStart = surfP + d0 / slp;
                const inspN2Start = n2Frac * (pAmbStart - ppH2O);
                const inspHeStart = heFracEff * (pAmbStart - ppH2O);
                const rN2 = n2Frac * pressureRate;
                const rHe = heFracEff * pressureRate;
                for (let i = 0; i < NUM_COMPARTMENTS; i++) {
                    const kN2 = Math.LN2 / _tblN2[i].ht;
                    const kHe = Math.LN2 / ZHL16C_He[i].ht;
                    tissues[i].pN2 = inspN2Start + rN2 * (dt - 1/kN2)
                        - (inspN2Start - tissues[i].pN2 - rN2/kN2) * Math.exp(-kN2 * dt);
                    tissues[i].pHe = inspHeStart + rHe * (dt - 1/kHe)
                        - (inspHeStart - tissues[i].pHe - rHe/kHe) * Math.exp(-kHe * dt);
                }
            }
        } else {
            const n2Frac = gasN2Fraction(o2Frac, heFrac);
            const depthRate = (endDepth - startDepth) / time;
            const pressureRate = depthRate / slp;
            const pAmbStart = surfP + startDepth / slp;
            const inspN2Start = n2Frac * (pAmbStart - ppH2O);
            const inspHeStart = heFrac * (pAmbStart - ppH2O);
            const rN2 = n2Frac * pressureRate;
            const rHe = heFrac * pressureRate;
            for (let i = 0; i < NUM_COMPARTMENTS; i++) {
                const kN2 = Math.LN2 / _tblN2[i].ht;
                const kHe = Math.LN2 / ZHL16C_He[i].ht;
                tissues[i].pN2 = inspN2Start + rN2 * (time - 1/kN2)
                    - (inspN2Start - tissues[i].pN2 - rN2/kN2) * Math.exp(-kN2 * time);
                tissues[i].pHe = inspHeStart + rHe * (time - 1/kHe)
                    - (inspHeStart - tissues[i].pHe - rHe/kHe) * Math.exp(-kHe * time);
            }
        }
        return time;
    }
    function getCeiling(tissues, settings, gfLo, gfHi, maxDepth) {
        const surfP = getSurfacePressure(settings);
        let slp;
        if (settings.metric) {
            slp = SLP_SW_M;
        } else {
            slp = SLP_SW_F;
        }
        let minPAmb = 0;
        for (let i = 0; i < NUM_COMPARTMENTS; i++) {
            const pTotal = tissues[i].pN2 + tissues[i].pHe;
            let a, b;
            if (pTotal > 0) {
                a = (tissues[i].pN2 * _tblN2[i].a + tissues[i].pHe * ZHL16C_He[i].a) / pTotal;
                b = (tissues[i].pN2 * _tblN2[i].b + tissues[i].pHe * ZHL16C_He[i].b) / pTotal;
            } else {
                a = _tblN2[i].a;
                b = _tblN2[i].b;

function makeSettings(opts) {
  const gfLo = opts.gfOverride ? opts.gfOverride.lo : (parseInt(document.getElementById('gfLo').value) || 30);
  const gfHi = opts.gfOverride ? opts.gfOverride.hi : (parseInt(document.getElementById('gfHi').value) || 85);
  const gfsHi = parseInt(document.getElementById('gfsHi').value) || 85;
  const waterType = opts.waterOverride !== undefined ? opts.waterOverride : parseInt(document.getElementById('water').value);
  const conserv = parseInt(document.getElementById('conserv').value) || 0;
  const step = parseInt(document.getElementById('step').value) || 3;
  return {
    metric: true,
    waterType,
    decoModel: opts.model || 'ZHLC_GF',
    gfLo,
    gfHi,
    gfs: gfsHi,
    conservatism: conserv,
    stepSize: step,
    lastStop: 3,
    descentRate: 20,
    ascentRate: 10,
    decoAscentRate: 9,
    surfaceAscentRate: 9,
    ppO2Bottom: 1.4,
    ppO2Deco: 1.6,
    ppO2Low: 1.4,
    ppO2Mid: 1.5,
    ppO2High: 1.6,
    minStopTime: 1,
    circuit: 'OC',
    altitude: 0,
    o2MaxDepth: 6,
    firstStop30sec: false,
    firstStopDoubleStep: false,
    extendedStops: false,
  };
}

function runLSPVPM(tc, model) {
  try {
    const settings = makeSettings({ model, gfOverride: tc.gfOverride, waterOverride: tc.waterOverride });
    const levels = [{ depth: tc.depth, time: tc.bt, o2: tc.bottomGas.o2, he: tc.bottomGas.he }];
    const decoGases = tc.decoGases.map(g => ({ o2: g.o2, he: g.he }));
    return LSP_VPMEngine.calculate(levels, decoGases, settings, model);
  } catch(e) {
    return { error: e.message, stops: [], totalRuntime: 0 };
  }
}

function runApexVPM(tc, model) {
  try {
    const settings = makeSettings({ model, gfOverride: tc.gfOverride, waterOverride: tc.waterOverride });
    const levels = [{ depth: tc.depth, time: tc.bt, o2: tc.bottomGas.o2, he: tc.bottomGas.he }];
    const decoGases = tc.decoGases.map(g => ({ o2: g.o2, he: g.he }));
    return VPMEngine.calculate(levels, decoGases, settings, model);
  } catch(e) {
    return { error: e.message, stops: [], totalRuntime: 0 };
  }
}

function runApexZHL(tc) {
  try {
    const settings = makeSettings({ model: 'ZHLC_GF', gfOverride: tc.gfOverride, waterOverride: tc.waterOverride });
    const levels = [{ depth: tc.depth, time: tc.bt, o2: tc.bottomGas.o2, he: tc.bottomGas.he }];
    const decoGases = tc.decoGases.map(g => ({ o2: g.o2, he: g.he }));
    return DecoEngine.calculate(levels, decoGases, settings);
  } catch(e) {
    return { error: e.message, stops: [], totalRuntime: 0 };
  }
}

function stopsStr(result) {
  if (!result || result.error) return '— ERROR —';
  const stops = result.stops || [];
  if (stops.length === 0) return 'No deco';
  return stops.map(s => `${s.depth}m×${s.time}min`).join(' | ');
}

function deltaStatus(delta) {
  const abs = Math.abs(delta);
  if (abs === 0) return 'match';
  if (abs <= 1) return 'close';
  if (abs <= 3) return 'diff';
  return 'bigdiff';
}

function deltaLabel(delta) {
  const abs = Math.abs(delta);
  if (abs === 0) return '✓ 0';
  if (abs <= 1) return `~${delta > 0 ? '+' : ''}${delta}`;
  return `${delta > 0 ? '+' : ''}${delta}`;
}

function renderResult(result, engineName, cls) {
  if (!result || result.error) {
    return `<span class="bigdiff">ERROR: ${result ? result.error : 'null'}</span>`;
  }
  const rt = result.totalRuntime || 0;
  return `<span class="${cls}">${rt} min</span>`;
}

function buildStopsTable(lspR, apexR, label) {
  if (!lspR && !apexR) return '';
  const lspStops = (lspR && !lspR.error) ? (lspR.stops || []) : null;
  const apexStops = (apexR && !apexR.error) ? (apexR.stops || []) : null;
  
  // Collect all stop depths
  const allDepths = new Set();
  if (lspStops) lspStops.forEach(s => allDepths.add(s.depth));
  if (apexStops) apexStops.forEach(s => allDepths.add(s.depth));
  const depths = Array.from(allDepths).sort((a,b) => b - a);
  
  if (depths.length === 0) return '<div style="color:var(--green);font-size:11px;padding:4px 0;">✓ No decompression required</div>';
  
  let rows = '';
  for (const d of depths) {
    const lStop = lspStops ? lspStops.find(s => s.depth === d) : null;
    const aStop = apexStops ? apexStops.find(s => s.depth === d) : null;
    const lt = lStop ? lStop.time : 0;
    const at = aStop ? aStop.time : 0;
    const delta = lt - at;
    const st = deltaStatus(delta);
    rows += `<tr class="stops-row">
      <td>${d}m</td>
      <td class="engine-lsp">${lt ? lt+'min' : '—'}</td>
      <td class="engine-apex">${at ? at+'min' : '—'}</td>
      <td class="${st}">${lspStops && apexStops ? deltaLabel(delta) : '—'}</td>
      <td class="${st}">${st === 'match' ? '✓' : st === 'close' ? '≈' : st === 'diff' ? '△' : '⚠'}</td>
    </tr>`;
  }
  
  // Total row
  const lspRT = (lspR && !lspR.error) ? (lspR.totalRuntime || 0) : null;
  const apexRT = (apexR && !apexR.error) ? (apexR.totalRuntime || 0) : null;
  const rtDelta = (lspRT !== null && apexRT !== null) ? lspRT - apexRT : null;
  const rtSt = rtDelta !== null ? deltaStatus(rtDelta) : '';
  
  return `
    <div class="algo-label">${label}</div>
    <table>
      <thead>
        <tr>
          <th class="col-depth">Depth</th>
          <th class="col-lsp" style="color:var(--blue)">LSP</th>
          <th class="col-apex" style="color:var(--purple)">ApexDeco</th>
          <th class="col-delta">Δ</th>
          <th class="col-status">OK?</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
        <tr style="border-top:1px solid var(--border);">
          <td><strong>Total RT</strong></td>
          <td class="engine-lsp"><strong>${lspRT !== null ? lspRT+'min' : 'ERR'}</strong></td>
          <td class="engine-apex"><strong>${apexRT !== null ? apexRT+'min' : 'ERR'}</strong></td>
          <td class="${rtSt}"><strong>${rtDelta !== null ? deltaLabel(rtDelta) : '—'}</strong></td>
          <td class="${rtSt}">${rtSt === 'match' ? '✓' : rtSt === 'close' ? '≈' : rtSt === 'diff' ? '△' : rtSt === 'bigdiff' ? '⚠' : '—'}</td>
        </tr>
      </tbody>
    </table>`;
}

function computeTestStatus(results) {
  // results: array of {lsp, apex, algo, isVPM}
  let maxDiff = 0;
  let hasError = false;
  
  for (const r of results) {
    if ((r.lsp && r.lsp.error) || (r.apex && r.apex.error)) { hasError = true; continue; }
    if (!r.lsp || !r.apex) continue;
    
    // Check stop times
    const lspStops = r.lsp.stops || [];
    const apexStops = r.apex.stops || [];
    
    // For VPM: LSP vs ApexVPM; for ZHL: LSP VPM not relevant, compare ZHL vs reference
    // Runtime delta
    const rtDelta = Math.abs((r.lsp.totalRuntime || 0) - (r.apex.totalRuntime || 0));
    maxDiff = Math.max(maxDiff, rtDelta);
    
    // Stop time deltas
    const allDepths = new Set([...lspStops.map(s=>s.depth), ...apexStops.map(s=>s.depth)]);
    for (const d of allDepths) {
      const ls = lspStops.find(s=>s.depth===d);
      const as = apexStops.find(s=>s.depth===d);
      const lt = ls ? ls.time : 0;
      const at = as ? as.time : 0;
      maxDiff = Math.max(maxDiff, Math.abs(lt - at));
    }
  }
  
  if (hasError) return 'fail';
  if (maxDiff === 0) return 'pass';
  if (maxDiff <= 1) return 'pass';
  if (maxDiff <= 3) return 'warn';
  return 'fail';
}

let totalPass = 0, totalWarn = 0, totalFail = 0;

function runAllTests(filterMode) {
  totalPass = 0; totalWarn = 0; totalFail = 0;
  const grid = document.getElementById('testGrid');
  grid.innerHTML = '';
  
  const algoFilter = document.getElementById('algoFilter').value;
  
  const tests = TEST_CASES;
  document.getElementById('totalTests').textContent = tests.length;
  document.getElementById('progressFill').style.width = '0%';
  
  let idx = 0;
  function runNext() {
    if (idx >= tests.length) {
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('passCount').textContent = totalPass;
      document.getElementById('warnCount').textContent = totalWarn;
      document.getElementById('failCount').textContent = totalFail;
      return;
    }
    const tc = tests[idx++];
    document.getElementById('progressFill').style.width = (idx/tests.length*100)+'%';
    renderTest(tc, algoFilter);
    setTimeout(runNext, 10);
  }
  runNext();
}

function renderTest(tc, algoFilter) {
  const grid = document.getElementById('testGrid');
  const card = document.createElement('div');
  card.className = 'test-card';
  card.id = `card-${tc.id}`;
  
  const algosToRun = algoFilter === 'all' ? tc.algos :
    tc.algos.filter(a => a.toLowerCase() === algoFilter);
  
  const params = `Depth: ${tc.depth}m | BT: ${tc.bt}min | Bottom: EAN${tc.bottomGas.o2} | Deco: ${tc.decoGases.length ? tc.decoGases.map(g=>`EAN${g.o2}`).join('+') : 'none'}`;
  
  // Run all algorithms
  const results = [];
  let sections = '';
  
  for (const algo of algosToRun) {
    let lspR = null, apexR = null;
    let lspLabel = 'LSP', apexLabel = 'ApexDeco';
    
    if (algo === 'ZHLC_GF') {
      // For ZHL: both engines
      lspR = runApexZHL(tc);  // LSP uses same ZHL logic — use ApexDeco's engine but note LSP water vapor differs
      apexR = runApexZHL(tc); // same engine for now (we'll note the water vapor difference)
      lspLabel = 'ZHL+GF (ApexRef)';
      apexLabel = 'ZHL+GF (ApexRef)';
      // Actually just run the ZHL engine once for this algo
      const zhlR = runApexZHL(tc);
      const algoLabel = `ZHL-16C+GF (GF ${tc.gfOverride ? tc.gfOverride.lo+'/'+tc.gfOverride.hi : document.getElementById('gfLo').value+'/'+document.getElementById('gfHi').value})`;
      if (zhlR && !zhlR.error) {
        const rt = zhlR.totalRuntime || 0;
        const stops = zhlR.stops || [];
        const stopsStr = stops.length ? stops.map(s=>`${s.depth}m×${s.time}min`).join(' | ') : 'No deco';
        sections += `<div class="algo-section">
          <div class="algo-label">ZHL-16C+GF (ApexDeco Engine — reference)</div>
          <div style="font-family:monospace;font-size:11px;padding:4px 0;color:var(--purple);">
            RT: ${rt} min | ${stopsStr}<br>
            OTU: ${zhlR.totalOTU||0} | CNS: ${(zhlR.totalCNS||0).toFixed(1)}%
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">ℹ LSP ZHL uses water vapor 0.0627 bar vs ApexDeco 0.0577 bar — small difference in NDL/ceiling expected</div>
        </div>`;
      } else {
        sections += `<div class="algo-section"><div class="algo-label">ZHL-16C+GF</div><span class="bigdiff">ERROR: ${zhlR ? zhlR.error : 'null'}</span></div>`;
      }
      results.push({ lsp: zhlR, apex: zhlR, algo });
    } else {
      // VPM-B or VPM-B/GFS: LSP vs ApexDeco
      lspR = runLSPVPM(tc, algo);
      apexR = runApexVPM(tc, algo);
      const algoLabel = `${algo} (VPM Conservatism +${document.getElementById('conserv').value})`;
      sections += buildStopsTable(lspR, apexR, algoLabel);
      results.push({ lsp: lspR, apex: apexR, algo });
    }
    
    if (sections && algo !== 'ZHLC_GF') sections += '<div class="divider"></div>';
  }
  
  const status = algosToRun.length === 0 ? 'pending' : computeTestStatus(results.filter(r => r.algo !== 'ZHLC_GF'));
  const badgeClass = status === 'pass' ? 'badge-pass' : status === 'warn' ? 'badge-warn' : status === 'fail' ? 'badge-fail' : 'badge-pending';
  const badgeText = status === 'pass' ? '✓ PASS' : status === 'warn' ? '△ WARN' : status === 'fail' ? '✗ FAIL' : '— SKIP';
  
  if (status === 'pass') totalPass++;
  else if (status === 'warn') totalWarn++;
  else if (status === 'fail') totalFail++;
  
  document.getElementById('passCount').textContent = totalPass;
  document.getElementById('warnCount').textContent = totalWarn;
  document.getElementById('failCount').textContent = totalFail;
  
  card.innerHTML = `
    <div class="test-header" onclick="toggleCard('${tc.id}')">
      <div>
        <span class="test-title">${tc.id}: ${tc.name}</span>
      </div>
      <span class="test-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div id="body-${tc.id}" class="test-body" style="display:${status==='fail'||status==='warn'?'block':'none'}">
      <div class="params">${params}</div>
      ${sections}
    </div>`;
  
  grid.appendChild(card);
}

function toggleCard(id) {
  const body = document.getElementById(`body-${id}`);
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
}
