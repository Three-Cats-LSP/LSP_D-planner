<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e1e1e">
    <title>LSP D-Planner - Math Verification Tests</title>
    <style>
        * { box-sizing: border-box; }
        html, body { background: #1e1e1e; }
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            margin: 0;
            padding: 20px;
            color: #d4d4d4;
            -webkit-text-size-adjust: 100%;
            overflow-x: hidden;
        }
        h1 { color: #569cd6; font-size: 18px; margin: 0 0 4px; word-wrap: break-word; }
        .subtitle { color: #9cdcfe; font-size: 12px; margin: 0 0 12px; }
        h2 { color: #4ec9b0; font-size: 15px; margin-top: 20px; }
        h3 { color: #dcdcaa; font-size: 13px; margin-top: 12px; }
        .section, .summary {
            width: 100%; max-width: 100%;
            margin: 12px 0; padding: 12px;
            border-radius: 4px; box-sizing: border-box;
        }
        .section { background: #252526; border: 1px solid #333; overflow: hidden; min-width: 0; }
        .summary { background: #1a3a1a; border: 1px solid #4ec9b0; }
        .summary.fail-summary { background: #3a1a1a; border-color: #f44747; }
        .table-wrap { display: block; width: 100%; max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; width: max-content; min-width: 100%; margin: 8px 0 16px; table-layout: auto; }
        th { background: #264f78; color: #fff; padding: 6px 10px; text-align: left; font-size: 12px; white-space: nowrap; position: sticky; top: 0; }
        td { padding: 5px 10px; border-bottom: 1px solid #333; font-size: 12px; word-break: break-word; }
        td.num, th.num { white-space: nowrap; text-align: right; font-variant-numeric: tabular-nums; }
        .pass { color: #4ec9b0; font-weight: bold; }
        .fail { color: #f44747; font-weight: bold; }
        .warn { color: #ce9178; }
        .info { color: #9cdcfe; }
        pre { background: #2d2d2d; padding: 8px; border-radius: 3px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
        @media (max-width: 640px) {
            body { padding: 10px; font-size: 12px; }
            h1 { font-size: 16px; }
            .section, .summary { padding: 10px; margin: 8px 0; }
            th, td { padding: 5px 6px; font-size: 11px; }
            td:first-child, th:first-child { word-break: break-word; min-width: 140px; }
        }
        @media (max-width: 380px) {
            body { padding: 8px; }
            th, td { padding: 4px 5px; font-size: 10.5px; }
        }
        #progress { color: #9cdcfe; margin-bottom: 8px; }
    </style>
</head>
<body>
<h1>LSP D-Planner — Math Verification Tests</h1>
<p class="subtitle">Buhlmann ZHL-16C GF · VPM-B / VPM-B/E / VPM-B GFS · Tool calculations</p>
<div id="progress">Loading engines...</div>
<div id="output"></div>

<script>
var DecoEngine = window.DecoEngine || null;
var VPMEngine  = window.VPMEngine  || null;
</script>

<script>
(function () {
    'use strict';

    const results = [];
    let totalTests = 0, passCount = 0, failCount = 0;
    let engineLoadError = null;

    function assertEqual(testName, actual, expected, tolerance, unit) {
        totalTests++;
        const diff = Math.abs(actual - expected);
        const passed = diff <= tolerance;
        if (passed) passCount++; else failCount++;
        results.push({ name: testName, actual, expected, diff, tolerance, unit: unit || '', passed, isString: false });
    }

    function assertBool(testName, actual, expected) {
        totalTests++;
        const passed = (!!actual) === (!!expected);
        if (passed) passCount++; else failCount++;
        results.push({ name: testName, actual: actual ? 'true' : 'false', expected: expected ? 'true' : 'false',
                       diff: passed ? 0 : 1, tolerance: 0, unit: '', passed, isString: true });
    }

    function renderResults() {
        let html = '';

        if (engineLoadError) {
            html += `<div class="section"><h2 class="fail">Engine Load Error</h2>
            <p class="fail">${engineLoadError}</p>
            <p class="warn">Make sure this page is served from the same origin as index.html (GitHub Pages or local server).</p>
            </div>`;
        }

        html += '<div class="section"><h2>Methodology</h2><div class="table-wrap"><table>';
        html += '<tr><th>Step</th><th>Description</th></tr>';
        [
            ['1','<b>Buhlmann ZHL-16C GF engine</b> — Compartment supersaturation checked against GF-adjusted M-values. Stop depth rounded to configured interval (default 3m).'],
            ['2','<b>VPM-B / VPM-B/E / VPM-B GFS</b> — Bubble-model critical radii, combined ascent ceiling from both bubble and Buhlmann loading.'],
            ['3','<b>Tool calculations</b> — Dive constants (SLP, Z-factors), gas density, EAD/MOD/END, best-mix.'],
            ['4','<b>CCR setpoint handling</b> — Effective O2/N2/He fractions recalculated per depth from SP; CCR plans must show less N2 loading than OC.'],
            ['5','<b>Multi-level profiles</b> — Re-descent and reverse-profile logic; deco obligations tracked across all segments.'],
            ['6','<b>Sanity invariants</b> — Deeper/longer dives produce more deco; VPM-B/E >= VPM-B; CCR <= OC for equal bottom time.'],
        ].forEach(([s,d]) => { html += `<tr><td>${s}</td><td>${d}</td></tr>`; });
        html += '</table></div></div>';

        const categories = {};
        results.forEach(r => {
            const cat = r.name.split(':')[0];
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(r);
        });

        for (const [cat, tests] of Object.entries(categories)) {
            const catPassed = tests.filter(t => t.passed).length;
            const catTotal  = tests.length;
            const allPass   = catPassed === catTotal;
            html += '<div class="section">';
            html += `<h2>${cat} <span class="${allPass ? 'pass' : 'fail'}">[${catPassed}/${catTotal}]</span></h2>`;
            html += '<div class="table-wrap"><table>';
            html += '<tr><th>Test</th><th class="num">Expected</th><th class="num">Actual</th><th class="num">Diff</th><th class="num">Tol.</th><th>Result</th></tr>';
            for (const t of tests) {
                const cls = t.passed ? 'pass' : 'fail';
                const actFmt = t.isString ? t.actual : (typeof t.actual === 'number' ? t.actual.toFixed(4) : String(t.actual));
                html += `<tr>
                    <td>${t.name.split(':').slice(1).join(':')}</td>
                    <td class="num">${t.expected}${t.unit}</td>
                    <td class="num">${actFmt}${t.unit}</td>
                    <td class="num">${t.isString ? '&mdash;' : t.diff.toFixed(6)}</td>
                    <td class="num">${t.isString ? '&mdash;' : '&plusmn;'+t.tolerance}</td>
                    <td class="${cls}">${t.passed ? 'PASS' : 'FAIL'}</td>
                </tr>`;
            }
            html += '</table></div></div>';
        }

        const allPass = failCount === 0;
        html += `<div class="summary ${allPass ? '' : 'fail-summary'}">`;
        html += `<h2>SUMMARY: <span class="${allPass ? 'pass' : 'fail'}">${passCount}/${totalTests} PASSED</span></h2>`;
        if (failCount > 0) {
            html += `<p class="fail">${failCount} test${failCount>1?'s':''} FAILED &mdash; see rows above.</p>`;
        } else {
            html += '<p class="pass">All tests passed &#10003;</p>';
        }
        html += '</div>';

        document.getElementById('output').innerHTML = html;
        document.getElementById('progress').textContent =
            `Done \u2014 ${passCount}/${totalTests} passed, ${failCount} failed.`;
    }

    const SLP_SW_m = 10.078;
    const SLP_FW_m = 10.337;

    function runTests(DE, VPM) {

        // ── 1. DEFAULT SETTINGS SHAPE ────────────────────────────────────
        (function() {
            let s;
            try { s = DE.createDefaultSettings(); } catch(e) {
                assertEqual('Settings:createDefaultSettings() does not throw', 0, 0, 0);
                return;
            }
            assertEqual('Settings:createDefaultSettings() returns object', typeof s === 'object' ? 1 : 0, 1, 0);
            assertEqual('Settings:metric field present', 'metric' in s ? 1 : 0, 1, 0);
            assertEqual('Settings:gfLo field present',  'gfLo'   in s ? 1 : 0, 1, 0);
            assertEqual('Settings:gfHi field present',  'gfHi'   in s ? 1 : 0, 1, 0);
        })();

        // ── 2. NO-DECO DIVES ─────────────────────────────────────────────
        (function() {
            const cases = [
                { label:'Air 10m/20min GF100/100',    levels:[{depth:10,time:20,o2:21,he:0}], gfL:100,gfH:100 },
                { label:'Air 15m/20min GF100/100',    levels:[{depth:15,time:20,o2:21,he:0}], gfL:100,gfH:100 },
                { label:'EAN32 12m/15min GF100/100',  levels:[{depth:12,time:15,o2:32,he:0}], gfL:100,gfH:100 },
                { label:'Air 20m/5min  GF100/100',    levels:[{depth:20,time:5, o2:21,he:0}], gfL:100,gfH:100 },
            ];
            cases.forEach(c => {
                const s = DE.createDefaultSettings();
                s.metric=true; s.waterType=0; s.gfLo=c.gfL; s.gfHi=c.gfH;
                const r = DE.calculate(c.levels, [], s);
                const decoStops = (r.stops||[]).filter(st=>st.type==='stop').length;
                assertEqual(`NoDeco:${c.label} \u2014 0 deco stops`, decoStops, 0, 0, ' stops');
            });
        })();

        // ── 3. BUHLMANN GF: DECO REQUIRED ───────────────────────────────
        (function() {
            const mk = (gfL,gfH) => {
                const s = DE.createDefaultSettings();
                s.metric=true; s.waterType=0;
                s.gfLo=gfL; s.gfHi=gfH;
                s.lastStopDepth=3; s.decoStopInterval=3;
                s.ascentRate=10; s.descentRate=20;
                return s;
            };

            const r1 = DE.calculate([{depth:30,time:25,o2:32,he:0}], [], mk(35,75));
            assertEqual('BuhlGF:EAN32 30m/25 GF35/75 has deco',
                (r1.stops||[]).filter(s=>s.type==='stop').length > 0 ? 1 : 0, 1, 0);

            const r2 = DE.calculate([{depth:40,time:25,o2:21,he:35}],
                [{o2:50,he:0},{o2:100,he:0}], mk(30,85));
            const stops2 = (r2.stops||[]).filter(s=>s.type==='stop');
            assertEqual('BuhlGF:Tx21/35 40m/25 has deco', stops2.length > 0 ? 1 : 0, 1, 0);
            assertEqual('BuhlGF:Tx21/35 40m/25 runtime 30\u201380',
                r2.totalRuntime>30 && r2.totalRuntime<80 ? 1 : 0, 1, 0);

            const r3 = DE.calculate([{depth:60,time:20,o2:18,he:45}],
                [{o2:50,he:0},{o2:100,he:0}], mk(30,85));
            assertEqual('BuhlGF:Tx18/45 60m/20 has deco',
                (r3.stops||[]).filter(s=>s.type==='stop').length > 0 ? 1 : 0, 1, 0);
            assertEqual('BuhlGF:Tx18/45 60m/20 runtime 40\u2013120',
                (r3.totalRuntime||0)>40 && (r3.totalRuntime||0)<120 ? 1 : 0, 1, 0);

            const r4a = DE.calculate([{depth:40,time:25,o2:21,he:35}],
                [{o2:50,he:0}], mk(30,85));
            const r4b = DE.calculate([{depth:50,time:25,o2:18,he:45}],
                [{o2:50,he:0}], mk(30,85));
            assertEqual('BuhlGF:50m runtime > 40m runtime',
                (r4b.totalRuntime||0) > (r4a.totalRuntime||0) ? 1 : 0, 1, 0);

            const rLax   = DE.calculate([{depth:40,time:25,o2:21,he:35}],[{o2:50,he:0}], mk(50,85));
            const rTight = DE.calculate([{depth:40,time:25,o2:21,he:35}],[{o2:50,he:0}], mk(20,70));
            assertEqual('BuhlGF:tighter GF \u2192 more deco',
                (rTight.totalRuntime||0) >= (rLax.totalRuntime||0) ? 1 : 0, 1, 0);
        })();

        // ── 4. VPM: ALL MODELS VALID ─────────────────────────────────────
        (function() {
            const s = DE.createDefaultSettings();
            s.metric=true; s.waterType=0; s.gfLo=30; s.gfHi=85;
            s.lastStopDepth=3; s.decoStopInterval=3;
            s.ascentRate=10; s.descentRate=20;
            const levels = [{depth:40,time:25,o2:21,he:35}];
            const decos  = [{o2:50,he:0},{o2:100,he:0}];

            for (const model of ['VPMA','VPMB','VPMBE','VPMB_GFS']) {
                const r = VPM.calculate(levels, decos, s, model);
                assertEqual(`VPM:${model} no error`,   r.error === null ? 1 : 0, 1, 0);
                assertEqual(`VPM:${model} has stops`,  (r.stops||[]).filter(st=>st.type==='stop').length>0 ? 1:0, 1, 0);
                assertEqual(`VPM:${model} runtime 30\u201380`,
                    r.totalRuntime>30 && r.totalRuntime<80 ? 1 : 0, 1, 0);
            }
        })();

        // ── 5. VPM INVARIANTS ────────────────────────────────────────────
        (function() {
            const s = DE.createDefaultSettings();
            s.metric=true; s.waterType=0; s.gfLo=30; s.gfHi=85;
            s.lastStopDepth=3; s.decoStopInterval=3;
            s.ascentRate=10; s.descentRate=20;
            const levels = [{depth:70,time:20,o2:18,he:45}];
            const decos  = [{o2:50,he:0},{o2:100,he:0}];

            const rB   = VPM.calculate(levels, decos, s, 'VPMB');
            const rBE  = VPM.calculate(levels, decos, s, 'VPMBE');
            const rGFS = VPM.calculate(levels, decos, s, 'VPMB_GFS');
            const rGF  = DE.calculate(levels, decos, s);

            assertEqual('VPMInv:VPM-B/E runtime \u2265 VPM-B (70m)',    rBE.totalRuntime  >= rB.totalRuntime  ? 1 : 0, 1, 0);
            assertEqual('VPMInv:VPM-B/GFS runtime \u2265 VPM-B',        rGFS.totalRuntime >= rB.totalRuntime  ? 1 : 0, 1, 0);
            assertEqual('VPMInv:Buhlmann has valid plan',  (rGF.stops||[]).length>0 ? 1:0, 1, 0);
            assertEqual('VPMInv:VPM-B has valid plan',     (rB.stops||[]).length>0  ? 1:0, 1, 0);
        })();

        // ── 6. MULTI-LEVEL PROFILES ──────────────────────────────────────
        (function() {
            const mkS = () => {
                const s = DE.createDefaultSettings();
                s.metric=true; s.waterType=0; s.gfLo=30; s.gfHi=85;
                s.lastStopDepth=3; s.decoStopInterval=3;
                s.ascentRate=10; s.descentRate=20;
                s.maxPpO2=1.4; s.maxPpO2Deco=1.6;
                return s;
            };
            const decos = [{o2:50,he:0},{o2:100,he:0}];

            // 100m complex
            const levels100 = [
                {depth:100,time:20,o2:16,he:65},
                {depth:21, time:10,o2:16,he:65},
                {depth:70, time:15,o2:16,he:65},
            ];
            const decos100 = [{o2:50,he:0},{o2:100,he:0},{o2:20,he:30}];
            for (const model of ['ZHLC_GF','VPMA','VPMB','VPMBE','VPMB_GFS']) {
                const s = mkS();
                const r = model==='ZHLC_GF' ? DE.calculate(levels100,decos100,s) : VPM.calculate(levels100,decos100,s,model);
                const stops = (r.stops||[]).filter(st=>st.type==='stop');
                const rt = r.totalRuntime||r.runtime||0;
                assertEqual(`MultiLvl:100m ${model} has deco`, stops.length>0?1:0, 1, 0);
                assertEqual(`MultiLvl:100m ${model} runtime 80\u2013250`, rt>=80&&rt<=250?1:0, 1, 0);
            }

            // Reverse profile 30m\u219260m
            for (const model of ['ZHLC_GF','VPMB']) {
                const s = mkS();
                const r = model==='ZHLC_GF'
                    ? DE.calculate([{depth:30,time:20,o2:28,he:0},{depth:60,time:10,o2:21,he:35}],decos,s)
                    : VPM.calculate([{depth:30,time:20,o2:28,he:0},{depth:60,time:10,o2:21,he:35}],decos,s,model);
                const rt = r.totalRuntime||r.runtime||0;
                assertEqual(`MultiLvl:reverse 30\u219260m ${model} has deco`,
                    (r.stops||[]).filter(st=>st.type==='stop').length>0?1:0, 1, 0);
                assertEqual(`MultiLvl:reverse 30\u219260m ${model} runtime 40\u2013120`, rt>=40&&rt<=120?1:0, 1, 0);
            }

            // Single vs multi — single 50m/35 should have >= deco
            const s = mkS();
            const rMulti  = DE.calculate([{depth:50,time:15,o2:21,he:35},{depth:30,time:10,o2:21,he:35},{depth:50,time:10,o2:21,he:35}],decos,s);
            const rSingle = DE.calculate([{depth:50,time:35,o2:21,he:35}],decos,s);
            const multiDeco  = (rMulti.stops||[]).filter(st=>st.type==='stop').reduce((a,st)=>a+st.time,0);
            const singleDeco = (rSingle.stops||[]).filter(st=>st.type==='stop').reduce((a,st)=>a+st.time,0);
            assertEqual('MultiLvl:single 50m/35 deco \u2265 multi 50-30-50', singleDeco>=multiDeco?1:0, 1, 0);
        })();

        // ── 7. CCR BUHLMANN ──────────────────────────────────────────────
        (function() {
            const mkS = (circuit) => {
                const s = DE.createDefaultSettings();
                s.metric=true; s.waterType=0; s.gfLo=30; s.gfHi=85;
                s.lastStopDepth=3; s.decoStopInterval=3;
                s.ascentRate=10; s.descentRate=20;
                s.maxPpO2=1.4; s.maxPpO2Deco=1.6;
                if (circuit) s.circuit = circuit;
                return s;
            };
            const decos = [{o2:50,he:0},{o2:100,he:0}];

            const rOC  = DE.calculate([{depth:40,time:25,o2:21,he:35,setpoint:1.3}], decos, mkS('OC'));
            const rCCR = DE.calculate([{depth:40,time:25,o2:21,he:35,setpoint:1.3}], decos, mkS('CCR'));
            const ocDeco  = (rOC.stops||[]).filter(s=>s.type==='stop').reduce((a,s)=>a+s.time,0);
            const ccrDeco = (rCCR.stops||[]).filter(s=>s.type==='stop').reduce((a,s)=>a+s.time,0);
            assertEqual('CCRBuhl:40m/25 Tx21/35 CCR plan valid',        rCCR.totalRuntime>25?1:0, 1, 0);
            assertEqual('CCRBuhl:40m/25 CCR deco \u2264 OC deco',       ccrDeco<=ocDeco?1:0, 1, 0);
            assertEqual('CCRBuhl:40m/25 CCR runtime reasonable',        rCCR.totalRuntime>25&&rCCR.totalRuntime<120?1:0, 1, 0);

            const rLow  = DE.calculate([{depth:50,time:20,o2:21,he:35,setpoint:0.9}],decos,mkS('CCR'));
            const rHigh = DE.calculate([{depth:50,time:20,o2:21,he:35,setpoint:1.3}],decos,mkS('CCR'));
            const dLow  = (rLow.stops||[]).filter(s=>s.type==='stop').reduce((a,s)=>a+s.time,0);
            const dHigh = (rHigh.stops||[]).filter(s=>s.type==='stop').reduce((a,s)=>a+s.time,0);
            assertEqual('CCRBuhl:SP 0.9 deco \u2265 SP 1.3 deco', dLow>=dHigh?1:0, 1, 0);

            const r60 = DE.calculate([{depth:60,time:20,o2:18,he:45,setpoint:1.3}],decos,mkS('CCR'));
            assertEqual('CCRBuhl:60m/20 Tx18/45 CCR valid', r60.totalRuntime>20?1:0, 1, 0);
        })();

        // ── 8. CCR VPM ──────────────────────────────────────────────────
        (function() {
            const mkS = (circuit) => {
                const s = DE.createDefaultSettings();
                s.metric=true; s.waterType=0; s.gfLo=30; s.gfHi=85;
                s.lastStopDepth=3; s.decoStopInterval=3;
                s.ascentRate=10; s.descentRate=20;
                s.maxPpO2=1.4; s.maxPpO2Deco=1.6;
                if (circuit) s.circuit = circuit;
                return s;
            };
            const decos = [{o2:50,he:0},{o2:100,he:0}];

            const rOC  = VPM.calculate([{depth:40,time:25,o2:21,he:35,setpoint:1.3}],decos,mkS('OC'),'VPMB');
            const rCCR = VPM.calculate([{depth:40,time:25,o2:21,he:35,setpoint:1.3}],decos,mkS('CCR'),'VPMB');
            const ocD  = (rOC.stops||[]).filter(s=>s.type==='stop').reduce((a,s)=>a+s.time,0);
            const ccrD = (rCCR.stops||[]).filter(s=>s.type==='stop').reduce((a,s)=>a+s.time,0);
            assertEqual('CCRVPM:40m/25 VPM-B CCR valid',      rCCR.totalRuntime>25?1:0, 1, 0);
            assertEqual('CCRVPM:40m/25 VPM-B CCR deco \u2264 OC',  ccrD<=ocD?1:0, 1, 0);

            const s60 = mkS('CCR');
            for (const model of ['VPMA','VPMB','VPMBE','VPMB_GFS']) {
                const r = VPM.calculate([{depth:60,time:20,o2:18,he:45,setpoint:1.3}],decos,s60,model);
                assertEqual(`CCRVPM:60m/20 ${model} CCR valid`,    r.totalRuntime>20?1:0, 1, 0);
                assertEqual(`CCRVPM:60m/20 ${model} CCR has stops`,(r.stops||[]).filter(st=>st.type==='stop').length>0?1:0, 1, 0);
            }

            const rB  = VPM.calculate([{depth:80,time:20,o2:12,he:60,setpoint:1.3},{depth:40,time:10,o2:12,he:60,setpoint:1.3}],decos,mkS('CCR'),'VPMB');
            const rBE = VPM.calculate([{depth:80,time:20,o2:12,he:60,setpoint:1.3},{depth:40,time:10,o2:12,he:60,setpoint:1.3}],decos,mkS('CCR'),'VPMBE');
            assertEqual('CCRVPM:multi 80-40m CCR VPM-B valid',     rB.totalRuntime>30?1:0, 1, 0);
            assertEqual('CCRVPM:multi 80-40m CCR VPM-BE \u2265 VPM-B', rBE.totalRuntime>=rB.totalRuntime?1:0, 1, 0);
        })();

        // ── 9. GAS TOOLS (if DiveTools present) ─────────────────────────
        if (typeof DiveTools !== 'undefined' && DiveTools) {
            (function() {
                if (typeof DiveTools.eadMod === 'function') {
                    const slp = SLP_SW_m;
                    const expMOD = Math.round((1.4/0.21-1)*slp);
                    const pAmb   = 1+30/slp;
                    const expEAD = Math.round((0.79*pAmb/0.79-1)*slp);
                    const r = DiveTools.eadMod(21,0,30,true,0,1.4,false,0);
                    assertEqual('GasTool:Air 30m MOD@1.4',            r.mod, expMOD, 0, 'm');
                    assertEqual('GasTool:Air 30m EAD = 30',            r.ead, expEAD, 0, 'm');

                    const pAmb2  = 1+40/SLP_SW_m;
                    const expEND = Math.round((0.44*pAmb2/0.79-1)*SLP_SW_m);
                    const r2 = DiveTools.eadMod(21,35,40,true,0,1.4,false,0);
                    assertEqual('GasTool:Tx21/35 40m END (O2 non-narc)', r2.end, expEND, 0, 'm');
                }
                if (typeof DiveTools.bestMix === 'function') {
                    const pAmb30 = 1+30/SLP_SW_m;
                    const exp30  = Math.floor((1.4/pAmb30)*100);
                    const r30 = DiveTools.bestMix(30,1.4,true,0,false,0);
                    assertEqual('GasTool:BestMix 30m ppO2=1.4', r30.o2, exp30, 1, '%');
                }
                if (typeof DiveTools.gasDensity === 'function') {
                    const pAmb = 1+30/SLP_SW_m;
                    const expD = (0.79*1.165+0.21*1.331)*pAmb;
                    const r = DiveTools.gasDensity(21,0,30,true,0,20,0);
                    assertEqual('GasTool:Air 30m 20\u00b0C density', r.density, Math.round(expD*100)/100, 0.01, ' g/L');
                }
            })();
        }

        // ── 10. DEEP TRIMIX / EXTREME ────────────────────────────────────
        (function() {
            const mk = () => {
                const s = DE.createDefaultSettings();
                s.metric=true; s.waterType=0; s.gfLo=30; s.gfHi=85;
                s.lastStopDepth=3; s.decoStopInterval=3;
                s.ascentRate=10; s.descentRate=20;
                s.maxPpO2=1.4; s.maxPpO2Deco=1.6;
                return s;
            };
            const decos = [{o2:50,he:0},{o2:100,he:0}];

            const rB = DE.calculate([{depth:80,time:25,o2:18,he:45},{depth:40,time:5,o2:18,he:45}],decos,mk());
            const rV = VPM.calculate([{depth:80,time:25,o2:18,he:45},{depth:40,time:5,o2:18,he:45}],decos,mk(),'VPMB');
            const stopsB = (rB.stops||[]).filter(s=>s.type==='stop');
            const stopsV = (rV.stops||[]).filter(s=>s.type==='stop');
            assertEqual('Deep:80m/25 Buhl has deco',        stopsB.length>0?1:0, 1, 0);
            assertEqual('Deep:80m/25 VPM-B has deco',       stopsV.length>0?1:0, 1, 0);
            assertEqual('Deep:80m/25 Buhl runtime 60\u2013180', (rB.totalRuntime||0)>=60&&(rB.totalRuntime||0)<=180?1:0, 1, 0);
            assertEqual('Deep:80m/25 VPM-B runtime 60\u2013180',(rV.totalRuntime||0)>=60&&(rV.totalRuntime||0)<=180?1:0, 1, 0);
            assertEqual('Deep:80m/25 Buhl 1st stop > 30m',  stopsB[0]&&stopsB[0].depth>30?1:0, 1, 0);
            assertEqual('Deep:80m/25 VPM-B 1st stop > 30m', stopsV[0]&&stopsV[0].depth>30?1:0, 1, 0);

            const sCCR = mk(); sCCR.circuit='CCR';
            const r100 = VPM.calculate([{depth:100,time:20,o2:10,he:70,setpoint:1.3},{depth:50,time:10,o2:10,he:70,setpoint:1.3}],decos,sCCR,'VPMB');
            assertEqual('Deep:100m CCR VPM-B valid',       r100.totalRuntime>30?1:0, 1, 0);
            assertEqual('Deep:100m CCR has deep stops',    (r100.stops||[]).filter(s=>s.type==='stop').length>0?1:0, 1, 0);
        })();

    } // end runTests()

    // ── ENGINE BOOTSTRAP ─────────────────────────────────────────────────
    function bootViaIframe() {
        const iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;';
        iframe.src = 'index.html';
        document.body.appendChild(iframe);

        const TIMEOUT = 15000;
        const start   = Date.now();

        function poll() {
            try {
                const w = iframe.contentWindow;
                if (w && w.DecoEngine && w.VPMEngine) {
                    document.getElementById('progress').textContent = 'Engines loaded \u2014 running tests...';
                    if (w.DiveTools) window.DiveTools = w.DiveTools;
                    runTests(w.DecoEngine, w.VPMEngine);
                    renderResults();
                    document.body.removeChild(iframe);
                    return;
                }
            } catch(e) { /* cross-origin or not ready */ }

            if (Date.now() - start > TIMEOUT) {
                engineLoadError = 'Timed out waiting for engines from index.html. ' +
                    'This page must be served from the same origin as index.html (GitHub Pages).';
                renderResults();
                document.body.removeChild(iframe);
                return;
            }
            setTimeout(poll, 150);
        }
        iframe.onload  = () => setTimeout(poll, 300);
        iframe.onerror = () => {
            engineLoadError = 'Failed to load index.html. Serve both files from the same directory.';
            renderResults();
        };
    }

    if (window.DecoEngine && window.VPMEngine) {
        document.getElementById('progress').textContent = 'Engines found \u2014 running tests...';
        runTests(window.DecoEngine, window.VPMEngine);
        renderResults();
    } else {
        bootViaIframe();
    }

})();
</script>
